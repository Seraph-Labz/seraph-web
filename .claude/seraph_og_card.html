<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Seraph — OG share card (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /*
    1200×630 Open Graph / Twitter share card.
    Open in a browser at 1:1 scale, screenshot, or render with puppeteer/playwright
    at viewport { width: 1200, height: 630, deviceScaleFactor: 2 } for a retina PNG.
  */
  :root {
    --void: #06080F;
    --fire: #DC2626;
    --fire-soft: #F87171;
    --violet: #6D28D9;
    --violet-soft: #A78BFA;
    --white: #FFFFFF;
    --dim: rgba(255,255,255,0.62);
    --mute: rgba(255,255,255,0.42);
    --line: rgba(255,255,255,0.10);
    --display: "Cormorant Garamond", serif;
    --body: "Space Grotesk", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #1a1a1a; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    font-family: var(--body);
  }
  .card {
    width: 1200px; height: 630px;
    background: var(--void);
    color: var(--white);
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  /* Aurora wash */
  .aurora {
    position: absolute; inset: 0;
    background:
      radial-gradient(60% 80% at 8% 30%, rgba(109,40,217,0.30), transparent 60%),
      radial-gradient(60% 80% at 92% 70%, rgba(220,38,38,0.32), transparent 60%);
    pointer-events: none;
  }
  /* Dot grid */
  .grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse at 35% 50%, black 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse at 35% 50%, black 30%, transparent 90%);
    opacity: 0.6;
    pointer-events: none;
  }
  /* Stars */
  .star {
    position: absolute; border-radius: 50%;
    background: var(--white);
    box-shadow: 0 0 8px rgba(255,255,255,0.7);
  }
  /* Edge accent — crimson glow on the right */
  .edge-glow {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, transparent, var(--fire) 30%, var(--fire) 70%, transparent);
    box-shadow: 0 0 32px var(--fire), 0 0 64px rgba(220,38,38,0.4);
  }
  /* Content */
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 64px 80px;
  }
  .head {
    display: flex; align-items: center; gap: 36px;
    margin-bottom: 36px;
  }
  .sigil-box {
    width: 168px; height: 168px;
    position: relative; flex-shrink: 0;
  }
  .sigil-box::before {
    content: ""; position: absolute; inset: -20%;
    background: radial-gradient(closest-side, rgba(220,38,38,0.45), transparent 70%);
    filter: blur(28px);
  }
  .sigil-box svg { position: relative; width: 100%; height: 100%; }
  .head-text { display: flex; flex-direction: column; gap: 8px; }
  .wordmark {
    font-family: var(--display); font-weight: 400;
    font-size: 132px; line-height: 1;
    letter-spacing: -0.02em;
  }
  .wordmark em {
    font-style: italic; font-weight: 500;
    background: linear-gradient(120deg, var(--fire-soft) 0%, var(--fire) 50%, var(--violet-soft) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .role {
    font-family: var(--mono); font-size: 14px;
    letter-spacing: 0.42em; text-transform: uppercase;
    color: var(--fire-soft);
    margin-left: 2px;
  }
  .tagline {
    font-family: var(--display); font-style: italic; font-weight: 400;
    font-size: 44px; line-height: 1.15;
    color: var(--white);
    margin-bottom: 48px;
    max-width: 22ch;
  }
  .tagline .accent {
    background: linear-gradient(120deg, var(--fire-soft), var(--violet-soft));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--fire), rgba(220,38,38,0.0));
    width: 360px;
    margin-bottom: 28px;
  }
  /* Coverage row */
  .coverage {
    display: flex; align-items: center; gap: 28px;
  }
  .coverage .label {
    font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--mute);
  }
  .protos {
    display: flex; gap: 18px; align-items: center;
  }
  .protos svg {
    width: 32px; height: 32px;
    opacity: 0.95;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  }
  /* Footer */
  .footer {
    position: absolute; bottom: 36px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 14px;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--mute);
  }
  .footer .domain { color: var(--white); font-weight: 500; }
  .footer .badge {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .footer .live {
    width: 7px; height: 7px; border-radius: 50%;
    background: #6EE7B7;
    box-shadow: 0 0 8px #6EE7B7;
  }
</style>
</head>
<body>

<div class="card">
  <div class="aurora"></div>
  <div class="grid"></div>

  <!-- Decorative stars -->
  <div class="star" style="top:8%; left:18%; width:2px; height:2px;"></div>
  <div class="star" style="top:14%; left:62%; width:3px; height:3px;"></div>
  <div class="star" style="top:22%; left:82%; width:2px; height:2px;"></div>
  <div class="star" style="top:38%; left:74%; width:2px; height:2px; opacity:0.8;"></div>
  <div class="star" style="top:64%; left:88%; width:3px; height:3px;"></div>
  <div class="star" style="top:72%; left:18%; width:2px; height:2px; opacity:0.6;"></div>
  <div class="star" style="top:84%; left:48%; width:2px; height:2px;"></div>
  <div class="star" style="top:46%; left:8%; width:2px; height:2px; opacity:0.7;"></div>
  <div class="star" style="top:28%; left:48%; width:2px; height:2px; opacity:0.5;"></div>

  <div class="edge-glow"></div>

  <div class="content">
    <div class="head">
      <div class="sigil-box">
        <svg viewBox="-80 -80 160 160" aria-hidden="true">
          <defs>
            <radialGradient id="wg" cx="50%" cy="0%" r="110%" gradientUnits="objectBoundingBox">
              <stop offset="0%" stop-color="#FFFFFF"/><stop offset="18%" stop-color="#FEE2E2"/>
              <stop offset="45%" stop-color="#DC2626"/><stop offset="78%" stop-color="#991B1B"/>
              <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0.7"/>
            </radialGradient>
            <radialGradient id="wgm" cx="50%" cy="0%" r="110%" gradientUnits="objectBoundingBox">
              <stop offset="0%" stop-color="#FFFFFF"/><stop offset="15%" stop-color="#FEE2E2"/>
              <stop offset="40%" stop-color="#EF4444"/><stop offset="75%" stop-color="#991B1B"/>
              <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0.6"/>
            </radialGradient>
            <radialGradient id="diamondGrad" cx="50%" cy="40%" r="65%">
              <stop offset="0%" stop-color="#FCA5A5"/>
              <stop offset="50%" stop-color="#DC2626"/>
              <stop offset="100%" stop-color="#7F1D1D"/>
            </radialGradient>
            <radialGradient id="halo" cx="50%" cy="50%" r="50%">
              <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
              <stop offset="100%" stop-color="rgba(220,38,38,0.10)"/>
            </radialGradient>
            <filter id="sglow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <symbol id="wingShort" overflow="visible">
              <path d="M 0 -4 C -6 -10, -11 -26, -7 -48 C -4 -58, 0 -60, 0 -60 C 0 -60, 4 -58, 7 -48 C 11 -26, 6 -10, 0 -4 Z" fill="url(#wg)" filter="url(#sglow)"/>
              <line x1="0" y1="-5" x2="0" y2="-56" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
            </symbol>
            <symbol id="wingLong" overflow="visible">
              <path d="M 0 -4 C -5 -9, -10 -24, -6 -50 C -3 -62, 0 -64, 0 -64 C 0 -64, 3 -62, 6 -50 C 10 -24, 5 -9, 0 -4 Z" fill="url(#wgm)" filter="url(#sglow)"/>
              <line x1="0" y1="-5" x2="0" y2="-60" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
            </symbol>
          </defs>
          <circle r="74" fill="url(#halo)" opacity="0.6"/>
          <circle r="72" fill="none" stroke="rgba(220,38,38,0.16)" stroke-width="0.5"/>
          <g transform="rotate(-38)"><use href="#wingShort"/></g>
          <g transform="rotate(38)"><use href="#wingShort"/></g>
          <g transform="rotate(-90)"><use href="#wingLong"/></g>
          <g transform="rotate(90)"><use href="#wingLong"/></g>
          <g transform="rotate(-142)"><use href="#wingShort"/></g>
          <g transform="rotate(142)"><use href="#wingShort"/></g>
          <polygon points="0,-7 5,0 0,7 -5,0" fill="url(#diamondGrad)" filter="url(#sglow)"/>
        </svg>
      </div>
      <div class="head-text">
        <div class="role">The Cross-Chain Explorer</div>
        <div class="wordmark">Ser<em>aph</em></div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="tagline">Every chain. Every bridge.<br/><span class="accent">One truth.</span></div>

    <div class="coverage">
      <div class="label">Watching</div>
      <div class="protos">
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><circle r="26" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.9"/><circle r="18" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.65"/><circle r="10" fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.45"/><text x="0" y="6" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-weight="700" font-size="13" fill="#FFFFFF">L0</text></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><path d="M 0 -24 A 24 24 0 1 1 -18 -16 A 16 16 0 1 0 -4 -12 A 8 8 0 1 1 0 -8" fill="none" stroke="#9E77ED" stroke-width="2.5" stroke-linecap="round"/><circle r="3" fill="#C4B5FD"/></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><path d="M -22 -10 L 18 -10 L 12 -16 M 18 -10 L 12 -4" fill="none" stroke="#6CF9D8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M 22 10 L -18 10 L -12 4 M -18 10 L -12 16" fill="none" stroke="#6CF9D8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><path d="M -22 14 Q 0 -26, 22 14" fill="none" stroke="#B32EAD" stroke-width="2.8" stroke-linecap="round"/><circle cx="-22" cy="14" r="3.2" fill="#B32EAD"/><circle cx="22" cy="14" r="3.2" fill="#B32EAD"/><circle cx="0" cy="-14" r="2.4" fill="#F472D5"/></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><circle r="22" fill="none" stroke="#3F7BE4" stroke-width="2.4"/><text x="0" y="8" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-weight="700" font-size="22" fill="#3F7BE4">$</text></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><polygon points="-18,-10 0,-22 18,-10 18,10 0,22 -18,10" fill="none" stroke="#E84142" stroke-width="2.2" stroke-linejoin="round"/><path d="M 2 -10 L -6 2 L 2 2 L -2 10" fill="none" stroke="#E84142" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><g stroke="#00D1FF" stroke-width="1.7" stroke-linecap="round"><line x1="0" y1="-24" x2="0" y2="24"/><line x1="-24" y1="0" x2="24" y2="0"/><line x1="-17" y1="-17" x2="17" y2="17"/><line x1="-17" y1="17" x2="17" y2="-17"/></g><circle r="6" fill="#00D1FF"/><circle r="3" fill="#E0F7FF"/></svg>
        <svg viewBox="-32 -32 64 64" aria-hidden="true"><circle cx="-9" cy="0" r="12" fill="none" stroke="#9F62FF" stroke-width="2.4"/><circle cx="9" cy="0" r="12" fill="none" stroke="#9F62FF" stroke-width="2.4"/></svg>
      </div>
      <div class="label" style="color: var(--dim);">8 protocols · 14 chains</div>
    </div>
  </div>

  <div class="footer">
    <div class="badge">
      <span class="live"></span>
      <span>Arriving Summer 2026</span>
    </div>
    <div class="domain">Seraphh.xyz</div>
  </div>
</div>

</body>
</html>
